services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-lacrei_db_v2}
      - POSTGRES_USER=${DATABASE_USER:-lacrei_user}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-lacrei_pass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-lacrei_user} -d ${DATABASE_NAME:-lacrei_db_v2}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DATABASE_NAME=${DATABASE_NAME:-lacrei_db_v2}
      - DATABASE_USER=${DATABASE_USER:-lacrei_user}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-lacrei_pass}
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - ASAAS_API_KEY=${ASAAS_API_KEY}
    depends_on:
      db:
        condition: service_healthy
